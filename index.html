<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamlar!</title>
    <style>
        /* Mevcut Renk Değişkenlerin - Dokunulmadı */
        :root {
            --bg-color: #f1f5f9;
            --container-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-muted: #475569;
            --primary: #3b82f6;
            --accent: #6366f1;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --container-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #60a5fa;
            --accent: #818cf8;
            --card-bg: #1e293b;
            --border: #334155;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        /* 2. ÖZELLİK: Arka Plan Aura Efekti (Sabit ve Hafif) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .main-container {
            max-width: 900px;
            width: 100%;
            background: var(--container-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: fadeIn 0.8s ease-out;
            position: relative;
        }

        nav {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            color: var(--text-main);
            font-weight: 600;
            font-size: 14px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            margin-bottom: 15px;
            object-fit: cover;
        }

        header h1 { font-size: 2.5rem; margin-bottom: 5px; }
        header p { color: var(--text-muted); font-size: 1.1rem; }

        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .skill-tag {
            background: var(--primary);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .search-box {
            width: 100%;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-main);
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .repo-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 25px; /* Biraz daha genişletildi */
            border-radius: 16px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            /* 3. ÖZELLİK: Geliştirilmiş Hover Geçişi */
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s, box-shadow 0.3s;
        }

        .repo-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .repo-title {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .repo-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .repo-footer {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 10px;
        }
.skill-tag {
            background: var(--primary);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        .skill-tag:hover {
            transform: scale(1.05);
            background: var(--accent);
        }



        /* 4. ÖZELLİK: Mevcut Tasarıma Uygun İletişim Bölümü */
        .contact-footer {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .contact-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .contact-btn {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }
        .contact-btn:hover { opacity: 0.7; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .main-container { padding: 20px; }
            header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <nav>
            <button class="theme-toggle" onclick="toggleTheme()">🌓 Mod Değiştir</button>
        </nav>

        <header id="profile-header">
            <h1>Yükleniyor...</h1>
        </header>

        <div class="skills-container">
            <span class="skill-tag">HTML5</span>
            <span class="skill-tag">CSS3</span>
            <span class="skill-tag">JavaScript</span>
            <span class="skill-tag">Python</span>
            <span class="skill-tag">UI Design</span>
        </div>

        <hr style="margin: 40px 0; border: 0; border-top: 1px solid var(--border);">

        <section>
            <h2 style="margin-bottom: 20px;">GitHub Projelerim</h2>
            <input type="text" id="searchInput" class="search-box" placeholder="Proje ismine göre ara..." onkeyup="filterRepos()">
            
            <div id="repo-grid" class="repo-grid"></div>
        </section>

        <footer class="contact-footer">
            <p style="color: var(--text-muted); font-size: 0.85rem;">© 2026 - Berke Değerli.</p>
            <div class="contact-links">
                <a href="mailto:berkedegerli98@gmail.com" class="contact-btn">E-posta Yaz</a>
                <a href="#" id="github-footer-link" class="contact-btn" target="_blank">GitHub Profilim</a>
            </div>
        </footer>
    </div>

    <script>
        const GITHUB_USERNAME = 'nikhdav'; 
        let allRepos = [];

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', targetTheme);
            localStorage.setItem('theme', targetTheme);
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        async function init() {
            try {
                // 1. Profil Bilgilerini Çek
                const userRes = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}`);
                const userData = await userRes.json();
                
                document.getElementById('profile-header').innerHTML = `
                    <img src="${userData.avatar_url}" class="profile-img" alt="Profil">
                    <h1>${userData.name || GITHUB_USERNAME}</h1>
                    <p>${userData.bio || 'Student & Part Time Developer'}</p>
                    <p style="font-size: 0.9rem; margin-top:5px;">📍 ${userData.location || 'Dünya'} | 💻 ${userData.public_repos} Repo</p>
                `;
                
                document.getElementById('github-footer-link').href = userData.html_url;

                // 2. Repoları Çek
                const repoRes = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos?sort=updated&per_page=100`);
                allRepos = await repoRes.json();
                
                // --- DİNAMİK YETENEK ANALİZİ (3. Özellik) ---
                const langCounts = {};
                allRepos.forEach(repo => {
                    if (repo.language) {
                        langCounts[repo.language] = (langCounts[repo.language] || 0) + 1;
                    }
                });

                // En çok kullanılan 5 dili sırala ve ekrana bas
                const skillsContainer = document.querySelector('.skills-container');
                skillsContainer.innerHTML = ''; // Statik olanları temizle
                
                Object.entries(langCounts)
                    .sort((a, b) => b[1] - a[1]) // En çok kullanılandan aza
                    .slice(0, 5) // İlk 5 dili al
                    .forEach(([lang, count]) => {
                        const span = document.createElement('span');
                        span.className = 'skill-tag';
                        span.innerText = `${lang} (${count})`;
                        skillsContainer.appendChild(span);
                    });

                renderRepos(allRepos);
            } catch (error) {
                console.error("Hata:", error);
                document.getElementById('profile-header').innerHTML = "<h1>Veriler yüklenemedi.</h1>";
            }
        }

        function renderRepos(repos) {
            const grid = document.getElementById('repo-grid');
            grid.innerHTML = '';
            
            repos.filter(r => !r.fork).forEach((repo, index) => {
                const card = document.createElement('a');
                card.href = repo.html_url;
                card.target = "_blank";
                card.className = 'repo-card';
                card.style.animation = `fadeIn 0.5s ease-out ${index * 0.05}s both`;

                card.innerHTML = `
                    <div>
                        <div class="repo-title">${repo.name}</div>
                        <div class="repo-desc">${repo.description || 'Açıklama bulunmuyor.'}</div>
                    </div>
                    <div class="repo-footer">
                        <span>● ${repo.language || 'Kod'}</span>
                        <span>⭐ ${repo.stargazers_count}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterRepos() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allRepos.filter(repo => 
                repo.name.toLowerCase().includes(term) || 
                (repo.description && repo.description.toLowerCase().includes(term))
            );
            renderRepos(filtered);
        }

        init();
    </script>
</body>
</html>
